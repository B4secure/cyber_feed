name: Ransomware News Collector
on:
  schedule:
    - cron: "0 6 * * *"   # Daily 06:00 UTC
  workflow_dispatch:
    inputs:
      run_mode:
        description: "Run mode (daily / weekly / monthly)"
        required: false
        default: "daily"
permissions:
  contents: write
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo apt-get clean

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run script
        run: python main.py
        env:
          RUN_MODE:          ${{ github.event.inputs.run_mode || 'daily' }}
          PAST_DAYS_DAILY:   "1"
          PAST_DAYS_WEEKLY:  "7"
          PAST_DAYS_MONTHLY: "30"
          MAX_ITEMS:         "50"
          DUP_THRESHOLD:     "0.65"
          MODEL_NAME:        "all-MiniLM-L6-v2"

      - name: Commit outputs
        shell: bash
        run: |
          set -e
          git config user.name  "github-actions"
          git config user.email "github-actions@github.com"

          files=()
          [ -f data/ransomware_latest.xlsx ]    && files+=(data/ransomware_latest.xlsx)
          [ -f docs/ransomware_feed.json ]       && files+=(docs/ransomware_feed.json)

          if [ ${#files[@]} -eq 0 ]; then
            echo "No output files to commit."
            exit 0
          fi

          git add "${files[@]}"

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Ransomware feed update — $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin HEAD:main
