name: Ransomware News Collector

on:
  schedule:
    - cron: "0 0 * * 3"   # Weekly Wednesday 00:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo apt-get clean

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run script
        run: python main.py
        env:
          PAST_DAYS:     "30"
          MAX_ITEMS:     "50"
          DUP_THRESHOLD: "0.60"
          MODEL_NAME:    "all-MiniLM-L6-v2"

      - name: Commit outputs
        shell: bash
        run: |
          set -e
          git config user.name  "github-actions"
          git config user.email "github-actions@github.com"

          files=()
          [ -f data/latest_ransomware_news.xlsx ] && files+=(data/latest_ransomware_news.xlsx)
          [ -f docs/feed.json ]                   && files+=(docs/feed.json)

          if [ ${#files[@]} -eq 0 ]; then
            echo "No output files to commit."
            exit 0
          fi

          git add "${files[@]}"

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update ransomware news feed"
          git push origin HEAD:main
